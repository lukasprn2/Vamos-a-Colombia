<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presidentes de Colombia – Línea del Tiempo</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:system-ui,sans-serif;color:#1a1200;position:relative;min-height:100vh;}

/* ── FONDO COLOMBIA ── */
.bg-colombia{
  position:fixed;inset:0;z-index:0;
  background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/colombie.jpg/1280px-colombie.jpg');
  background-size:cover;background-position:center;
}
.bg-colombia::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,253,245,0.88);
}

.content{position:relative;z-index:1;}

/* ── HERO ── */
.hero{
  background:linear-gradient(135deg,rgba(0,56,147,0.95) 0%,rgba(0,80,204,0.92) 100%);
  border-radius:16px;padding:2rem 1.5rem;text-align:center;
  margin:1rem 1rem 1.5rem;overflow:hidden;position:relative;
}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(252,209,22,.12);}
.flag-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:1rem;width:160px;margin-left:auto;margin-right:auto;}
.flag-bar span:nth-child(1){flex:2;background:#FCD116;}
.flag-bar span:nth-child(2){flex:1;background:#003893;}
.flag-bar span:nth-child(3){flex:1;background:#CE1126;}
.hero h1{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:700;color:#FCD116;letter-spacing:.02em;margin-bottom:.3rem;}
.hero p{font-size:.85rem;color:rgba(255,255,255,.75);}

/* ── LEYENDAS ── */
.legend{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin:0 1rem 1rem;padding:.75rem;}
.leg-item{display:flex;align-items:center;gap:.35rem;font-size:.75rem;color:#444;background:rgba(255,255,255,0.88);border:1px solid #ddd;border-radius:100px;padding:.2rem .65rem;}
.leg-dot{width:10px;height:10px;border-radius:50%;}
.score-legend{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;margin:0 1rem 1.5rem;}
.sl{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:#444;background:rgba(255,255,255,0.85);padding:.25rem .65rem;border-radius:8px;}
.sl-badge{font-size:.72rem;font-weight:700;padding:.1rem .45rem;border-radius:6px;color:white;}

/* ── NAVEGACIÓN ── */
.tl-nav{display:flex;justify-content:center;gap:.6rem;margin-bottom:.8rem;}
.nav-btn{background:rgba(255,255,255,0.92);border:1px solid #ccc;border-radius:8px;padding:.35rem .9rem;cursor:pointer;font-size:.85rem;color:#1a1200;transition:background .15s;}
.nav-btn:hover{background:white;}

/* ── SCROLL ── */
.tl-scroll{overflow-x:auto;padding:1rem 1.5rem 1.5rem;scrollbar-width:thin;scrollbar-color:#FCD116 transparent;cursor:grab;}
.tl-scroll:active{cursor:grabbing;}
.tl-scroll::-webkit-scrollbar{height:6px;}
.tl-scroll::-webkit-scrollbar-track{background:rgba(240,232,208,0.5);border-radius:10px;}
.tl-scroll::-webkit-scrollbar-thumb{background:#FCD116;border-radius:10px;}
.cards-row{display:flex;gap:1rem;align-items:flex-start;min-width:max-content;position:relative;padding-bottom:2.2rem;}
.axis-line{position:absolute;bottom:.9rem;left:0;right:0;height:3px;background:rgba(0,0,0,.12);border-radius:2px;}

/* ── TARJETAS ── */
.pcard{
  width:182px;flex-shrink:0;cursor:pointer;
  background:rgba(255,255,255,0.93);
  border:1px solid rgba(255,255,255,.9);
  border-radius:16px;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.pcard:hover{transform:translateY(-6px);box-shadow:0 14px 35px rgba(0,0,0,.18);}
.pcard-stripe{height:5px;display:block;}
.pcard-img-wrap{height:110px;overflow:hidden;background:#f0f0f0;position:relative;}
.pcard-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.pcard-img-wrap .fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:3rem;background:#f5f5f5;}
.pcard-body{padding:.7rem .85rem;}
.pcard-year{font-size:1.5rem;font-weight:700;line-height:1;}
.pcard-name{font-size:.72rem;font-weight:700;margin:.2rem 0 .15rem;color:#1a1200;line-height:1.3;}
.pcard-partido{font-size:.6rem;color:#888;margin-bottom:.5rem;}
.score-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.55rem;}
.score-num{font-size:1.4rem;font-weight:700;line-height:1;}
.score-bar-bg{flex:1;height:5px;border-radius:3px;background:#e8e8e8;}
.score-bar-fill{height:100%;border-radius:3px;}

/* PALABRAS CLAVE EN TARJETA */
.desc-keys{display:flex;flex-wrap:wrap;gap:.28rem;margin-bottom:.45rem;}
.dkey{font-size:.6rem;font-weight:600;padding:.18rem .5rem;border-radius:100px;background:rgba(0,0,0,.06);color:#444;border:1px solid rgba(0,0,0,.1);white-space:nowrap;}

.chips{display:flex;flex-wrap:wrap;gap:.25rem;}
.chip{font-size:.58rem;padding:.13rem .42rem;border-radius:100px;border:1px solid;white-space:nowrap;background:transparent;font-weight:600;}
.hint{font-size:.57rem;color:#bbb;margin-top:.4rem;}
.axis-label{position:absolute;bottom:0;font-size:.68rem;color:#888;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:18px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(20px) scale(.97);transition:transform .3s cubic-bezier(.22,1,.36,1);border:1px solid #e8e8e8;scrollbar-width:thin;}
.overlay.open .modal{transform:none;}
.modal-stripe{height:9px;border-radius:18px 18px 0 0;display:flex;overflow:hidden;}
.modal-stripe span:nth-child(1){flex:2;background:#FCD116;}
.modal-stripe span:nth-child(2){flex:1;background:#003893;}
.modal-stripe span:nth-child(3){flex:1;background:#CE1126;}
.m-inner{padding:1.5rem 1.75rem 2rem;}
.m-close{float:right;background:#f2f2f2;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:.9rem;color:#333;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .2s;}
.m-close:hover{background:#e0e0e0;transform:rotate(90deg);}
.m-header{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1.2rem;}
.m-photo{width:90px;height:90px;border-radius:12px;object-fit:cover;object-position:top;flex-shrink:0;border:1px solid #e8e8e8;}
.m-photo-fall{width:90px;height:90px;border-radius:12px;flex-shrink:0;border:1px solid #e8e8e8;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.m-tag{display:inline-block;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.12rem .55rem;border-radius:100px;color:white;margin-bottom:.45rem;}
.m-year{font-size:2.2rem;font-weight:700;line-height:1;}
.m-name{font-size:1.15rem;font-weight:700;line-height:1.2;margin:.12rem 0 .12rem;}
.m-period{font-size:.77rem;color:#888;margin-bottom:.5rem;}

/* PALABRAS CLAVE EN MODAL */
.m-desc-keys{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.2rem;}
.m-dkey{font-size:.78rem;font-weight:600;padding:.25rem .7rem;border-radius:100px;background:#f5f5f5;color:#444;border:1px solid #e0e0e0;}

.m-score-block{display:flex;align-items:center;gap:1rem;background:#f8f8f8;border-radius:12px;padding:.9rem 1.1rem;margin-bottom:1.2rem;}
.m-score-big{font-size:3.5rem;font-weight:700;line-height:1;}
.m-score-right{flex:1;}
.m-score-label{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:.35rem;}
.m-bar-bg{height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden;margin-bottom:.3rem;}
.m-bar-fill{height:100%;border-radius:4px;}
.m-score-sub{font-size:.68rem;color:#aaa;}
.m-section{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin:1rem 0 .55rem;display:flex;align-items:center;gap:.4rem;}
.m-section::after{content:'';flex:1;height:1px;background:#f0f0f0;}
.action-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.action-item{display:flex;gap:.55rem;align-items:flex-start;padding:.6rem .8rem;border-radius:8px;border:1px solid;font-size:.82rem;line-height:1.6;color:#333;}
.action-item.pos{border-color:#3B6D11;background:#EAF3DE;}
.action-item.neg{border-color:#A32D2D;background:#FCEBEB;}
.ab{flex-shrink:0;font-size:.72rem;font-weight:700;padding:.08rem .38rem;border-radius:5px;color:white;min-width:30px;text-align:center;}
.ab.p{background:#3B6D11;}
.ab.n{background:#A32D2D;}
.m-datos{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:.55rem;margin-bottom:1.1rem;}
.m-dato{background:#f8f8f8;border-radius:8px;padding:.7rem;text-align:center;border-bottom:3px solid;}
.dn{font-size:1.4rem;font-weight:700;line-height:1;}
.dl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-top:.12rem;}
.m-cita{border-left:4px solid;border-radius:0 8px 8px 0;padding:.8rem .95rem;background:#fffdf5;font-style:italic;font-size:.84rem;color:#666;line-height:1.7;}
.m-cita cite{display:block;margin-top:.35rem;font-style:normal;font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#bbb;}

/* ── FOOTER ── */
footer{background:linear-gradient(135deg,rgba(0,56,147,.96),rgba(0,80,204,.93));color:white;text-align:center;padding:2.5rem 1.5rem;margin-top:1rem;}
.f-flag{display:flex;justify-content:center;margin-bottom:.8rem;}
.f-flag span{height:9px;display:block;}
.f-flag span:nth-child(1){width:100px;background:#FCD116;}
.f-flag span:nth-child(2){width:50px;background:#003893;}
.f-flag span:nth-child(3){width:50px;background:#CE1126;}
footer h3{font-size:1.8rem;font-weight:700;color:#FCD116;}
footer p{font-size:.78rem;opacity:.5;margin-top:.3rem;}

@media(max-width:600px){
  .m-header{flex-direction:column;}
  .m-score-block{flex-direction:column;gap:.6rem;}
  .m-datos{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- FONDO COLOMBIA -->
<div class="bg-colombia"></div>

<div class="content">

  <!-- HERO -->
  <div class="hero">
    <div class="flag-bar"><span></span><span></span><span></span></div>
    <h1>Presidentes de Colombia</h1>
    <p>Línea del tiempo 1990 – 2026</p>
  </div>

  <!-- LEYENDA PARTIDOS -->
  <div class="legend" id="legend"></div>

  <!-- LEYENDA PUNTUACIÓN -->
  <div class="score-legend">
    <div class="sl"><span class="sl-badge" style="background:#3B6D11">+1</span> Acción positiva para Colombia</div>
    <div class="sl"><span class="sl-badge" style="background:#A32D2D">−2</span> Escándalo / acción negativa</div>
    <div class="sl"><span style="font-size:1rem">⭐</span> Puntuación total del mandato</div>
  </div>

  <!-- NAVEGACIÓN -->
  <div class="tl-nav">
    <button class="nav-btn" id="btnL">◀ Anterior</button>
    <button class="nav-btn" id="btnR">Siguiente ▶</button>
  </div>

  <!-- TIMELINE -->
  <div class="tl-scroll" id="tlScroll">
    <div class="cards-row" id="tlTrack">
      <div class="axis-line"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="f-flag"><span></span><span></span><span></span></div>
    <h3>¡Viva Colombia!</h3>
    <p>Línea del Tiempo · Presidentes 1990–2026</p>
  </footer>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-stripe"><span></span><span></span><span></span></div>
    <div class="m-inner" id="mInner"></div>
  </div>
</div>

<script>
const PRES = [
  {
    nombre:"César Gaviria", inicio:1990, fin:1994,
    partido:"Partido Liberal", color:"#CE1126",
    foto:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Gaviria_trujillo_cesar.jpg/400px-Gaviria_trujillo_cesar.jpg",
    emoji:"🗳️",
    descKeys:["Nueva Constitución 1991","Apertura económica","Caída de Pablo Escobar","Fiscalía General creada","Violencia narco máxima","Desigualdad social"],
    palabras:["constitución","apertura","narco"],
    acciones:[
      {t:"pos",p:1,txt:"Constitución de 1991 — nuevos derechos para todos los colombianos"},
      {t:"pos",p:1,txt:"Apertura económica — Colombia empieza a exportar e importar libremente"},
      {t:"pos",p:1,txt:"Creación de la Fiscalía General y la Corte Constitucional"},
      {t:"pos",p:1,txt:"Caída de Pablo Escobar y el Cartel de Medellín (1993)"},
      {t:"neg",p:-2,txt:"Privatizaciones masivas que aumentaron la desigualdad social"},

    ],
    datos:[{n:"1991",l:"Constitución"},{n:"4 años",l:"Duración"},{n:"Medellín",l:"Cartel caído"}],
    cita:"«La Constitución del 91 fue nuestra refundación como nación.»"
  },
  {
    nombre:"Ernesto Samper", inicio:1994, fin:1998,
    partido:"Partido Liberal", color:"#CE1126",
    foto:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Ernesto_Samper_Pizano.jpg/400px-Ernesto_Samper_Pizano.jpg",
    emoji:"⚠️",
    descKeys:["Escándalo Proceso 8000","Narco financió su campaña","Descertificado por EE.UU.","Crisis institucional grave","Cartel de Cali caído","Salto Social"],
    palabras:["corrupción","escándalo","crisis"],
    acciones:[
      {t:"pos",p:1,txt:"El Salto Social — programas de vivienda y salud para los más pobres"},
      {t:"pos",p:1,txt:"Desmantelamiento del Cartel de Cali"},
      {t:"neg",p:-2,txt:"Proceso 8.000 — financiación narco de su campaña presidencial"},
      {t:"neg",p:-2,txt:"EE.UU. le retiró la visa y descertificó al país 2 años seguidos"},
      {t:"neg",p:-2,txt:"Crisis de credibilidad política e institucional gravísima"},
    ],
    datos:[{n:"8.000",l:"El Proceso"},{n:"4 años",l:"Duración"},{n:"1996",l:"Descertificación"}],
    cita:"«Entré con el corazón y los votos del pueblo colombiano.»"
  },
  {
    nombre:"Andrés Pastrana", inicio:1998, fin:2002,
    partido:"Partido Conservador", color:"#1B4FCC",
    foto:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Andres_pastrana_arango.jpg/400px-Andres_pastrana_arango.jpg",
    emoji:"🕊️",
    descKeys:["Diálogos de paz FARC","Zona del Caguán fracasó","Plan Colombia USD 1.300M","Crisis económica 1999","Extradición reactivada","Desempleo 20%"],
    palabras:["paz","guerrilla","Plan Colombia"],
    acciones:[
      {t:"pos",p:1,txt:"Plan Colombia — 1.300 millones USD para modernizar las fuerzas militares"},
      {t:"pos",p:1,txt:"Reactivó la extradición de narcotraficantes hacia EE.UU."},
      {t:"neg",p:-2,txt:"El Caguán fracasó — las FARC usaron la zona para fortalecerse"},
      {t:"neg",p:-2,txt:"Crisis económica 1999 — desempleo al 20%, la peor en 70 años"},
      {t:"neg",p:-2,txt:"Pérdida total de confianza en el proceso de paz"},
    ],
    datos:[{n:"42.000",l:"km² zona paz"},{n:"$1.300M",l:"EE.UU."},{n:"4 años",l:"Duración"}],
    cita:"«Le aposté a la paz porque Colombia merece vivir sin guerra.»"
  },
  {
    nombre:"Álvaro Uribe", inicio:2002, fin:2010,
    partido:"Partido de la U / Uribismo", color:"#CC0F1A",
    foto:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/%C3%81lvaro_Uribe_V%C3%A9lez%2C_presidente_de_Colombia.jpg/400px-%C3%81lvaro_Uribe_V%C3%A9lez%2C_presidente_de_Colombia.jpg",
    emoji:"⚔️",
    descKeys:["Seguridad Democrática","Secuestros −90%","Operación Jaque 2008","8 años con reelección","Falsos positivos","Parapolítica","Espionaje DAS"],
    palabras:["seguridad","reelección","guerrilla"],
    acciones:[
      {t:"pos",p:1,txt:"Seguridad Democrática — homicidios −40%, secuestros −90%"},
      {t:"pos",p:1,txt:"Operación Jaque (2008) — rescate de Ingrid Betancourt sin disparos"},
      {t:"pos",p:1,txt:"El PIB creció de 98.000 a 234.000 millones USD en 8 años"},

    ],

    cita:"«La paz no es el silencio de los fusiles. Es la victoria de la esperanza.»"
  },
  {
    nombre:"Iván Duque", inicio:2018, fin:2022,
    partido:"Centro Democrático", color:"#0A7A3C",
    foto:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Ivan_Duque_Presidente.jpg/400px-Ivan_Duque_Presidente.jpg",
    emoji:"😷",
    descKeys:["Pandemia COVID-19","Ingreso Solidario","1,8M venezolanos protegidos","Colombia en la OCDE 2020","Paro Nacional 2021","Corrupción contratos"],
    palabras:["pandemia","migrantes","protesta"],
    acciones:[

      {t:"neg",p:-2,txt:"Escándalos de corrupción en contratos durante la pandemia"},
    ],

    cita:"«Colombia tiene la determinación para ser una potencia mundial.»"
  },
  {
    nombre:"Gustavo Petro", inicio:2022, fin:2026,
    partido:"Pacto Histórico (Izquierda)", color:"#7B2FBE",
    foto:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Gustavo_Petro_Presidente.jpg/400px-Gustavo_Petro_Presidente.jpg",
    emoji:"🌹",
    descKeys:["1er presidente de izquierda","Francia Márquez vicepresidenta","Paz Total con ELN","Reformas bloqueadas","Violencia aumentó en regiones","Tensiones institucionales"],
    palabras:["izquierda","reforma","histórico"],
    acciones:[
      {t:"pos",p:1,txt:"Primer presidente de izquierda — hito histórico para la democracia"},
      {t:"pos",p:1,txt:"Francia Márquez — primera vicepresidenta afrocolombiana"},
      {t:"pos",p:1,txt:"Paz Total — diálogos con el ELN y otros grupos armados"},
      {t:"neg",p:-2,txt:"Reformas de salud y pensiones bloqueadas por falta de acuerdos"},
      {t:"neg",p:-2,txt:"Aumento de la violencia en algunas regiones durante la Paz Total"},
      {t:"neg",p:-2,txt:"Tensiones institucionales y escándalos dentro del gobierno"},

];

/* ── CALCULAR PUNTUACIONES ── */
PRES.forEach(p => {
  p.score = p.acciones.reduce((s, a) => s + a.p, 0);
});
const absMax = Math.max(...PRES.map(p => Math.abs(p.score)), 4);
const sColor = s => s >= 0 ? '#3B6D11' : '#A32D2D';
const barW   = s => Math.min(100, Math.round(Math.abs(s) / absMax * 100));

/* ── LEYENDA PARTIDOS ── */
const partidos = [...new Set(PRES.map(p => p.partido))];
const legEl = document.getElementById('legend');
partidos.forEach(par => {
  const c = PRES.find(p => p.partido === par).color;
  const el = document.createElement('div');
  el.className = 'leg-item';
  el.innerHTML = `<span class="leg-dot" style="background:${c}"></span>${par}`;
  legEl.appendChild(el);
});

/* ── CONSTRUIR TARJETAS ── */
const track = document.getElementById('tlTrack');
PRES.forEach(p => {
  const sc = p.score, sCol = sColor(sc), bw = barW(sc);
  const dkeysHTML = p.descKeys.map(k => `<span class="dkey">${k}</span>`).join('');

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative;display:flex;flex-direction:column;align-items:center;';

  const card = document.createElement('div');
  card.className = 'pcard';
  card.innerHTML = `
    <span class="pcard-stripe" style="background:${p.color}"></span>
    <div class="pcard-img-wrap">
      <img src="${p.foto}" alt="${p.nombre}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="fallback">${p.emoji}</div>
    </div>
    <div class="pcard-body">
      <div class="pcard-year" style="color:${p.color}">${p.inicio}</div>
      <div class="pcard-name">${p.nombre}</div>
      <div class="pcard-partido">${p.partido}</div>
      <div class="score-row">
        <span class="score-num" style="color:${sCol}">${sc > 0 ? '+' : ''}${sc}</span>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${bw}%;background:${sCol}"></div>
        </div>
      </div>
      <div class="desc-keys">${dkeysHTML}</div>
      <div class="hint">▸ clic para ver detalles</div>
    </div>
  `;
  card.addEventListener('click', () => openModal(p));

  const ax = document.createElement('div');
  ax.className = 'axis-label';
  ax.textContent = `${p.inicio}–${p.fin}`;

  wrap.appendChild(card);
  wrap.appendChild(ax);
  track.appendChild(wrap);
});

/* ── MODAL ── */
function openModal(p) {
  const sc = p.score, sCol = sColor(sc), bw = barW(sc);
  const pos = p.acciones.filter(a => a.t === 'pos');
  const neg = p.acciones.filter(a => a.t === 'neg');
  const posH = pos.map(a => `<li class="action-item pos"><span class="ab p">+1</span><span>${a.txt}</span></li>`).join('');
  const negH = neg.map(a => `<li class="action-item neg"><span class="ab n">−2</span><span>${a.txt}</span></li>`).join('');
  const datH = p.datos.map(d =>
    `<div class="m-dato" style="border-color:${p.color}">
       <div class="dn" style="color:${p.color}">${d.n}</div>
       <div class="dl">${d.l}</div>
     </div>`
  ).join('');
  const dkH = p.descKeys.map(k => `<span class="m-dkey">${k}</span>`).join('');

  document.getElementById('mInner').innerHTML = `
    <button class="m-close" id="closeBtn">✕</button>
    <div class="m-header">
      <img class="m-photo" src="${p.foto}" alt="${p.nombre}"
           onerror="this.outerHTML='<div class=\\'m-photo-fall\\'>${p.emoji}</div>'">
      <div>
        <span class="m-tag" style="background:${p.color}">${p.partido}</span>
        <div class="m-year" style="color:${p.color}">${p.inicio}</div>
        <div class="m-name">${p.nombre}</div>
        <div class="m-period">📅 ${p.inicio} – ${p.fin}</div>
      </div>
    </div>
    <div class="m-desc-keys">${dkH}</div>
    <div class="m-score-block">
      <div class="m-score-big" style="color:${sCol}">${sc > 0 ? '+' : ''}${sc}</div>
      <div class="m-score-right">
        <div class="m-score-label">⭐ Puntuación del mandato</div>
        <div class="m-bar-bg">
          <div class="m-bar-fill" style="width:${bw}%;background:${sCol}"></div>
        </div>
        <div class="m-score-sub">${pos.length} acciones positivas · ${neg.length} acciones negativas</div>
      </div>
    </div>
    <div class="m-section" style="color:#3B6D11">✅ Acciones positivas</div>
    <ul class="action-list">${posH}</ul>
    <div class="m-section" style="color:#A32D2D">❌ Acciones negativas</div>
    <ul class="action-list">${negH}</ul>
    <div class="m-section" style="color:${p.color}">📊 En cifras</div>
    <div class="m-datos">${datH}</div>
    <div class="m-cita" style="border-color:${p.color}">
      ${p.cita}
      <cite>— ${p.nombre}</cite>
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('closeBtn').addEventListener('click', closeModal);
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── NAVEGACIÓN ── */
const scr = document.getElementById('tlScroll');
document.getElementById('btnL').addEventListener('click', () => scr.scrollBy({ left: -220, behavior: 'smooth' }));
document.getElementById('btnR').addEventListener('click', () => scr.scrollBy({ left: 220, behavior: 'smooth' }));

let down = false, sx, sl;
scr.addEventListener('mousedown', e => { down = true; sx = e.pageX - scr.offsetLeft; sl = scr.scrollLeft; });
scr.addEventListener('mouseleave', () => down = false);
scr.addEventListener('mouseup', () => down = false);
scr.addEventListener('mousemove', e => {
  if (!down) return;
  e.preventDefault();
  scr.scrollLeft = sl - (e.pageX - scr.offsetLeft - sx) * 1.3;
});
</script>
</body>
</html>
