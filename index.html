<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presidentes de Colombia – Frise 1990–2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --am: #FCD116;
  --az: #003893;
  --ro: #CE1126;
  --ve: #1a7a1a;
  --cr: #FFFBF0;
  --dk: #0a0400;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family:'Nunito',sans-serif;
  background: var(--dk);
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ══ HERO ══ */
.hero {
  position: relative;
  text-align: center;
  padding: 5rem 2rem 3rem;
  background: var(--az);
  overflow: hidden;
}
.hero-noise {
  position:absolute;inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;pointer-events:none;
}
.hero-flag-bar {
  position:absolute;top:0;left:0;right:0;
  height:8px;display:flex;
}
.hero-flag-bar span { display:block;height:100%; }
.hero-flag-bar span:nth-child(1){ flex:2;background:var(--am); }
.hero-flag-bar span:nth-child(2){ flex:1;background:var(--az); }
.hero-flag-bar span:nth-child(3){ flex:1;background:var(--ro); }

.hero-deco {
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
.hero-deco span {
  position:absolute;border-radius:50%;
}
.hero-deco span:nth-child(1){
  width:600px;height:600px;
  background:radial-gradient(circle,var(--am),transparent 65%);
  top:-220px;right:-180px;opacity:.08;
  animation:spin 40s linear infinite;
}
.hero-deco span:nth-child(2){
  width:400px;height:400px;
  background:radial-gradient(circle,var(--ro),transparent 65%);
  bottom:-160px;left:-120px;opacity:.07;
  animation:spin 28s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg);}}

.hero-emoji {
  font-size:4.5rem;
  display:block;margin-bottom:.8rem;
  animation:float 3.5s ease-in-out infinite;
  filter:drop-shadow(0 0 22px rgba(252,209,22,.65));
  position:relative;z-index:2;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

.hero h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,9vw,7.5rem);
  color:var(--am);
  line-height:.9;
  text-shadow:4px 4px 0 var(--ro),9px 9px 0 rgba(0,0,0,.35);
  position:relative;z-index:2;
  animation:drop .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes drop{from{opacity:0;transform:translateY(-35px);}to{opacity:1;transform:none;}}

.hero-sub {
  font-size:clamp(.8rem,2vw,1.1rem);
  font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,.75);
  margin-top:.9rem;
  position:relative;z-index:2;
  animation:drop .9s .2s cubic-bezier(.22,1,.36,1) both;
}
.hero-hint {
  color:rgba(255,255,255,.4);font-size:.82rem;margin-top:.5rem;
  position:relative;z-index:2;
  animation:drop .9s .35s cubic-bezier(.22,1,.36,1) both;
}

/* ══ TIMELINE WRAPPER ══ */
.tl-outer {
  position:relative;
  padding: 4rem 0 5rem;
  background: var(--dk);
}

/* Axis line */
.tl-axis {
  position:absolute;
  top:50%;left:0;right:0;
  height:6px;
  transform:translateY(-50%);
  background:linear-gradient(90deg,
    var(--am) 0%, var(--am) 14%,
    var(--ro) 14%, var(--ro) 28%,
    var(--az) 28%, var(--az) 42%,
    var(--ro) 42%, var(--ro) 56%,
    #F4A261 56%, #F4A261 70%,
    var(--az) 70%, var(--az) 84%,
    #7c3fa0 84%, #7c3fa0 100%
  );
  z-index:0;
}
.tl-axis::before,.tl-axis::after{
  content:'';position:absolute;top:50%;
  width:0;height:0;
  border-top:10px solid transparent;
  border-bottom:10px solid transparent;
  transform:translateY(-50%);
}
.tl-axis::after{
  right:-2px;
  border-left:16px solid #7c3fa0;
}
.tl-axis::before{
  left:-2px;
  border-right:16px solid var(--am);
}

/* Scroll container */
.tl-scroll {
  overflow-x:auto;
  padding: 0 3rem;
  cursor:grab;
  scrollbar-width:thin;
  scrollbar-color: var(--am) rgba(255,255,255,.1);
}
.tl-scroll:active{cursor:grabbing;}
.tl-scroll::-webkit-scrollbar{height:5px;}
.tl-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,.08);border-radius:10px;}
.tl-scroll::-webkit-scrollbar-thumb{background:var(--am);border-radius:10px;}

.tl-track {
  display:flex;
  align-items:center;
  min-width:max-content;
  padding: 220px 80px;
  gap:0;
  position:relative;
}

/* ── NODE ── */
.tl-node {
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  width:180px;
  flex-shrink:0;
  cursor:pointer;
}

/* Card top (odd) / bottom (even) */
.tl-node:nth-child(odd) .tl-card  { bottom:calc(100% + 30px); top:auto; }
.tl-node:nth-child(even) .tl-card { top:calc(100% + 30px); bottom:auto; }
.tl-node:nth-child(odd) .tl-connector  { bottom:100%; top:auto; transform-origin:bottom center; }
.tl-node:nth-child(even) .tl-connector { top:100%; bottom:auto; transform-origin:top center; }

/* Dot on axis */
.tl-dot {
  width:26px;height:26px;border-radius:50%;
  border:4px solid var(--dk);
  box-shadow:0 0 0 3px currentColor, 0 0 14px currentColor;
  z-index:10;position:relative;
  transition:transform .25s, box-shadow .25s;
  flex-shrink:0;
}
.tl-node:hover .tl-dot {
  transform:scale(1.5);
  box-shadow:0 0 0 4px currentColor, 0 0 28px currentColor;
}

/* Connector stem */
.tl-connector {
  width:3px;height:55px;
  background:currentColor;
  opacity:.5;
  position:relative;
  z-index:1;
}

/* Card */
.tl-card {
  position:absolute;
  width:170px;
  background:#161010;
  border-radius:14px;
  padding:1rem;
  border:2px solid currentColor;
  transition:transform .25s, box-shadow .25s, background .25s;
  z-index:5;
}
.tl-node:hover .tl-card {
  background:#1f1515;
  transform:scale(1.06);
  box-shadow:0 8px 32px rgba(0,0,0,.5), 0 0 20px rgba(var(--rc),0.3);
}

.tl-card-top {
  height:5px;border-radius:10px 10px 0 0;
  margin:-1rem -1rem .8rem;
  background:currentColor;
}
.tl-year {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.7rem;line-height:1;
  color:currentColor;
}
.tl-name {
  font-size:.75rem;font-weight:900;
  line-height:1.3;margin:.3rem 0 .2rem;
  color:#fff;
}
.tl-partido {
  font-size:.62rem;font-weight:700;
  color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:.08em;
}
.tl-emoji-card {
  font-size:1.4rem;margin-bottom:.25rem;display:block;
}
.tl-badge {
  display:inline-block;margin-top:.5rem;
  font-size:.58rem;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.1rem .45rem;border-radius:100px;
  background:currentColor;color:var(--dk);
}

/* Year label on axis */
.tl-axis-year {
  position:absolute;
  bottom:-38px;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.1rem;
  color:rgba(255,255,255,.3);
  white-space:nowrap;
}

/* ══ SCROLL ARROWS ══ */
.nav-arrows {
  display:flex;justify-content:center;gap:1rem;
  padding:.8rem 0 0;
}
.nav-btn {
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.2);
  color:#fff;border-radius:50%;
  width:44px;height:44px;font-size:1.2rem;
  cursor:pointer;
  transition:background .2s,border-color .2s,transform .2s;
  display:flex;align-items:center;justify-content:center;
}
.nav-btn:hover{background:var(--am);border-color:var(--am);color:var(--dk);transform:scale(1.1);}

/* ══ MODAL ══ */
.overlay {
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
  backdrop-filter:blur(10px);
}
.overlay.open{opacity:1;pointer-events:all;}

.modal {
  background:#130c05;
  border-radius:24px;
  max-width:660px;width:100%;
  max-height:90vh;overflow-y:auto;
  transform:scale(.82) translateY(40px);
  transition:transform .38s cubic-bezier(.22,1,.36,1);
  position:relative;
  border:1px solid rgba(255,255,255,.1);
  scrollbar-width:thin;scrollbar-color:var(--am) transparent;
}
.overlay.open .modal{transform:scale(1) translateY(0);}

.modal-banner {
  height:12px;border-radius:24px 24px 0 0;
  display:flex;overflow:hidden;
}
.modal-banner span{display:block;height:100%;}
.modal-banner span:nth-child(1){flex:2;background:var(--am);}
.modal-banner span:nth-child(2){flex:1;background:var(--az);}
.modal-banner span:nth-child(3){flex:1;background:var(--ro);}

.modal-body { padding:2rem 2.2rem 2.5rem; }

.m-tag {
  display:inline-block;font-size:.68rem;font-weight:800;
  letter-spacing:.14em;text-transform:uppercase;
  padding:.13rem .6rem;border-radius:100px;
  margin-bottom:.9rem;
}
.m-emoji{font-size:3.5rem;display:block;margin-bottom:.5rem;}
.m-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2rem,5vw,3.2rem);
  line-height:1;color:#fff;
}
.m-period{
  font-size:.85rem;font-weight:700;letter-spacing:.08em;
  margin:.4rem 0 .15rem;
}
.m-partido{font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:1.2rem;}
.m-desc{
  font-size:.95rem;line-height:1.85;
  color:rgba(255,255,255,.75);margin-bottom:1.5rem;
}

.m-section{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;margin-bottom:.8rem;letter-spacing:.04em;
}
.m-logros{list-style:none;display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.5rem;}
.m-logros li{
  background:rgba(255,255,255,.05);
  border-radius:12px;padding:.75rem 1rem;
  font-size:.88rem;line-height:1.6;
  display:flex;gap:.7rem;align-items:flex-start;
  border-left:3px solid transparent;
  color:rgba(255,255,255,.8);
}
.m-logros li .ico{flex-shrink:0;font-size:1.1rem;}

.m-datos{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:.7rem;margin-bottom:1.5rem;
}
.m-dato{
  background:rgba(255,255,255,.05);border-radius:12px;
  padding:.8rem;text-align:center;
}
.m-dato .dn{
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem;line-height:1;
}
.m-dato .dl{
  font-size:.65rem;font-weight:800;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:.2rem;
}
.m-cita{
  border-left:4px solid;
  border-radius:0 12px 12px 0;
  background:rgba(255,255,255,.04);
  padding:1rem 1.2rem;
  font-style:italic;font-size:.9rem;
  color:rgba(255,255,255,.6);line-height:1.75;
}
.m-cita cite{
  display:block;margin-top:.5rem;
  font-style:normal;font-size:.72rem;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.3);
}

.close-btn{
  position:absolute;top:1.4rem;right:1.4rem;
  background:rgba(255,255,255,.1);border:none;
  border-radius:50%;width:40px;height:40px;
  font-size:1.1rem;font-weight:900;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;z-index:2;
}
.close-btn:hover{background:rgba(255,255,255,.2);transform:scale(1.1) rotate(90deg);}

/* ══ FOOTER ══ */
footer{
  background:var(--az);color:#fff;
  text-align:center;padding:2.5rem 1.5rem;
}
.f-flag{display:flex;justify-content:center;margin-bottom:.9rem;}
.f-flag span{height:8px;display:block;}
.f-flag span:nth-child(1){width:110px;background:var(--am);}
.f-flag span:nth-child(2){width:55px;background:var(--az);}
.f-flag span:nth-child(3){width:55px;background:var(--ro);}
footer h3{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--am);letter-spacing:.1em;}
footer p{font-size:.78rem;opacity:.5;margin-top:.3rem;}
</style>
</head>

// ── BUILD TIMELINE ──
const track = document.getElementById('tlTrack');

DATA.forEach((p, i) => {
  const node = document.createElement('div');
  node.className = 'tl-node';
  node.style.color = p.color;

  const isOdd = i % 2 === 0;
  const textColor = p.color === '#F4A261' ? '#1a0a00' : '#fff';

  node.innerHTML = `
    ${isOdd ? `
      <div class="tl-card" style="color:${p.color};">
        <div class="tl-card-top"></div>
        <span class="tl-emoji-card">${p.emoji}</span>
        <div class="tl-year">${p.inicio}</div>
        <div class="tl-name">${p.nombre}</div>
        <div class="tl-partido">${p.partido}</div>
        <span class="tl-badge" style="color:${textColor}">${p.tag}</span>
      </div>
      <div class="tl-connector"></div>
    ` : ''}
    <div class="tl-dot"></div>
    ${!isOdd ? `
      <div class="tl-connector"></div>
      <div class="tl-card" style="color:${p.color};">
        <div class="tl-card-top"></div>
        <span class="tl-emoji-card">${p.emoji}</span>
        <div class="tl-year">${p.inicio}</div>
        <div class="tl-name">${p.nombre}</div>
        <div class="tl-partido">${p.partido}</div>
        <span class="tl-badge" style="color:${textColor}">${p.tag}</span>
      </div>
    ` : ''}
    <div class="tl-axis-year">${p.inicio}–${p.fin}</div>
  `;

  node.addEventListener('click', () => openModal(p));
  track.appendChild(node);

  // spacer between nodes
  if (i < DATA.length - 1) {
    const sp = document.createElement('div');
    sp.style.cssText = 'width:60px;flex-shrink:0;';
    track.appendChild(sp);
  }
});

// ── MODAL ──
function openModal(p) {
  const textColor = p.color === '#F4A261' ? '#1a0a00' : '#fff';
  document.getElementById('modalBody').innerHTML = `
    <span class="m-tag" style="background:${p.color};color:${textColor}">${p.tag}</span>
    <span class="m-emoji">${p.emoji}</span>
    <div class="m-name" style="color:${p.color}">${p.nombre}</div>
    <div class="m-period" style="color:${p.color}">📅 ${p.inicio} – ${p.fin}</div>
    <div class="m-partido">🏛️ ${p.partido}</div>
    <p class="m-desc">${p.desc}</p>
    <div class="m-section" style="color:${p.color}">🏆 Logros y momentos clave</div>
    <ul class="m-logros">
      ${p.logros.map(l=>`<li style="border-color:${p.color}"><span class="ico">${l.ico}</span>${l.txt}</li>`).join('')}
    </ul>
    <div class="m-section" style="color:${p.color}">📊 En cifras</div>
    <div class="m-datos">
      ${p.datos.map(d=>`<div class="m-dato"><div class="dn" style="color:${p.color}">${d.n}</div><div class="dl">${d.l}</div></div>`).join('')}
    </div>
    <div class="m-cita" style="border-color:${p.color}">
      ${p.cita}
      <cite>— ${p.nombre}</cite>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('closeBtn').addEventListener('click', close);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) close();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') close(); });
function close() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── NAV ARROWS ──
const scr = document.getElementById('tlScroll');
document.getElementById('btnLeft').addEventListener('click', () => scr.scrollBy({left:-320,behavior:'smooth'}));
document.getElementById('btnRight').addEventListener('click', () => scr.scrollBy({left:320,behavior:'smooth'}));

// ── DRAG TO SCROLL ──
let isDown=false,startX,scrollLeft;
scr.addEventListener('mousedown',e=>{isDown=true;scr.style.cursor='grabbing';startX=e.pageX-scr.offsetLeft;scrollLeft=scr.scrollLeft;});
scr.addEventListener('mouseleave',()=>{isDown=false;scr.style.cursor='grab';});
scr.addEventListener('mouseup',()=>{isDown=false;scr.style.cursor='grab';});
scr.addEventListener('mousemove',e=>{
  if(!isDown)return;e.preventDefault();
  const x=e.pageX-scr.offsetLeft;
  scr.scrollLeft=scrollLeft-(x-startX)*1.5;
});
</script>
