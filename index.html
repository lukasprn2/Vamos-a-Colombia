<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presidentes de Colombia – Línea del Tiempo 1990–2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --am: #FCD116;
  --az: #003893;
  --ro: #CE1126;
  --dk: #0a0400;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Nunito',sans-serif;
  background: var(--dk);
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}
/* HERO */
.hero {
  position: relative;
  text-align: center;
  padding: 5rem 2rem 3rem;
  background: var(--az);
  overflow: hidden;
}
.hero-emoji {
  font-size:4.5rem;
  display:block;
  margin-bottom:.8rem;
}
.hero h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,9vw,7.5rem);
  color:var(--am);
  line-height:.9;
  text-shadow:4px 4px 0 var(--ro),9px 9px 0 rgba(0,0,0,.35);
  position:relative;z-index:2;
}
.hero-sub {
  font-size:1rem;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,.75);
  margin-top:.9rem;
}
.hero-hint {
  font-size:.82rem;
  margin-top:.5rem;
  color:rgba(255,255,255,.4);
}

/* TIMELINE */
.tl-outer { position:relative; padding: 4rem 0 5rem; background: var(--dk); }
.tl-axis {
  position:absolute;
  top:50%;left:0;right:0;
  height:6px;
  transform:translateY(-50%);
  background:linear-gradient(90deg,var(--am) 0%,var(--az) 50%,var(--ro) 100%);
  z-index:0;
}
.tl-scroll { overflow-x:auto; padding: 0 3rem; cursor:grab; scrollbar-width:thin; scrollbar-color: var(--am) rgba(255,255,255,.1);}
.tl-scroll:active{cursor:grabbing;}
.tl-scroll::-webkit-scrollbar{height:5px;}
.tl-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,.08);border-radius:10px;}
.tl-scroll::-webkit-scrollbar-thumb{background:var(--am);border-radius:10px;}
.tl-track { display:flex; align-items:center; min-width:max-content; padding: 220px 80px; gap:0; position:relative; }
.tl-node { display:flex; flex-direction:column; align-items:center; position:relative; width:180px; flex-shrink:0; cursor:pointer; }
.tl-dot { width:26px;height:26px;border-radius:50%; border:4px solid var(--dk); box-shadow:0 0 0 3px currentColor,0 0 14px currentColor; z-index:10; position:relative; transition:transform .25s, box-shadow .25s; flex-shrink:0;}
.tl-node:hover .tl-dot { transform:scale(1.5); box-shadow:0 0 0 4px currentColor,0 0 28px currentColor;}
.tl-connector { width:3px;height:55px; background:currentColor; opacity:.5; position:relative; z-index:1;}
.tl-card { position:absolute; width:170px; background:#161010; border-radius:14px; padding:1rem; border:2px solid currentColor; transition:transform .25s, box-shadow .25s, background .25s; z-index:5; }
.tl-card-top { height:5px;border-radius:10px 10px 0 0; margin:-1rem -1rem .8rem; background:currentColor;}
.tl-year { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; color:currentColor; }
.tl-name { font-size:.75rem;font-weight:900; line-height:1.3;margin:.3rem 0 .2rem;color:#fff; }
.tl-partido { font-size:.62rem;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em; }
.tl-badge { display:inline-block;margin-top:.5rem; font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.1rem .45rem;border-radius:100px; background:currentColor;color:var(--dk);}
.tl-axis-year { position:absolute; bottom:-38px; font-family:'Bebas Neue',sans-serif; font-size:1.1rem;color:rgba(255,255,255,.3); white-space:nowrap;}

/* MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity .3s; backdrop-filter:blur(10px);}
.overlay.open{opacity:1; pointer-events:all;}
.modal { background:#130c05; border-radius:24px; max-width:660px;width:100%; max-height:90vh; overflow-y:auto; transform:scale(.82) translateY(40px); transition:transform .38s cubic-bezier(.22,1,.36,1); position:relative; border:1px solid rgba(255,255,255,.1);}
.overlay.open .modal{transform:scale(1) translateY(0);}
.modal-banner { height:12px;border-radius:24px 24px 0 0; display:flex; overflow:hidden; }
.modal-banner span:nth-child(1){flex:2;background:var(--am);}
.modal-banner span:nth-child(2){flex:1;background:var(--az);}
.modal-banner span:nth-child(3){flex:1;background:var(--ro);}
.modal-body { padding:2rem 2.2rem 2.5rem; }
.m-tag { display:inline-block;font-size:.68rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:.13rem .6rem;margin-bottom:.9rem;}
.m-emoji{font-size:3.5rem;display:block;margin-bottom:.5rem;}
.m-name { font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.2rem);line-height:1;color:#fff;}
.m-period{font-size:.85rem;font-weight:700;letter-spacing:.08em;margin:.4rem 0 .15rem;}
.m-partido{font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:1.2rem;}
.m-section{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;margin-bottom:.8rem;letter-spacing:.04em;}
.m-logros{list-style:none; display:flex; flex-direction:column; gap:.6rem;margin-bottom:1.5rem;}
.m-logros li{ background:rgba(255,255,255,.05); border-radius:12px; padding:.75rem 1rem; font-size:.88rem; display:flex; gap:.7rem; align-items:flex-start; border-left:3px solid transparent; color:rgba(255,255,255,.8);}
.m-logros li .ico{flex-shrink:0;font-size:1.1rem;}
.m-datos{ display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:.7rem;margin-bottom:1.5rem;}
.m-dato{ background:rgba(255,255,255,.05); border-radius:12px; padding:.8rem; text-align:center;}
.m-dato .dn{ font-family:'Bebas Neue',sans-serif; font-size:2rem;line-height:1;}
.m-dato .dl{ font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:.2rem;}
.m-cita{display:none;}
.close-btn{position:absolute;top:1.4rem;right:1.4rem;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:40px;height:40px;font-size:1.1rem;font-weight:900;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s;z-index:2;}
.close-btn:hover{background:rgba(255,255,255,.2);transform:scale(1.1) rotate(90deg);}

/* FOOTER */
footer{ background:var(--az); color:#fff; text-align:center; padding:2.5rem 1.5rem;}
.f-flag{ display:flex; justify-content:center; margin-bottom:.9rem; }
.f-flag span{height:8px;display:block;}
.f-flag span:nth-child(1){width:110px;background:var(--am);}
.f-flag span:nth-child(2){width:55px;background:var(--az);}
.f-flag span:nth-child(3){width:55px;background:var(--ro);}
footer h3{ font-family:'Bebas Neue',sans-serif; font-size:2rem;color:var(--am); letter-spacing:.1em;}
footer p{ font-size:.78rem; opacity:.5;margin-top:.3rem;}
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <span class="hero-emoji">🇨🇴</span>
  <h1>PRESIDENTES<br>DE COLOMBIA</h1>
  <p class="hero-sub">✦ Línea del Tiempo 1990 – 2026 ✦</p>
  <p class="hero-hint">Arrastra la frise · Haz clic en cada presidente</p>
</header>

<!-- TIMELINE -->
<div class="tl-outer">
  <div class="tl-axis"></div>
  <div class="tl-scroll" id="tlScroll">
    <div class="tl-track" id="tlTrack"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-banner"><span></span><span></span><span></span></div>
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="f-flag"><span></span><span></span><span></span></div>
  <h3>¡Viva Colombia!</h3>
  <p>Línea del Tiempo Interactiva · Presidentes 1990–2026</p>
</footer>

<script>
const DATA = [
  {nombre:"César Gaviria",inicio:1990,fin:1994,partido:"Liberal",tag:"Liberal",color:"#FCD116",emoji:"🗳️",desc:"Palabras clave: gobierno, paz, política, carta, ley",logros:[{ico:"📜",txt:"Constitución"},{ico:"💰",txt:"Economía"},{ico:"⚖️",txt:"Justicia"}],datos:[{n:"1991",l:"Constitución"},{n:"4",l:"Años"},{n:"Medellín",l:"Cartel"}],cita:""}
  ,{nombre:"Ernesto Samper",inicio:1994,fin:1998,partido:"Liberal",tag:"Liberal",color:"#003893",emoji:"⚠️",desc:"Palabras clave: escándalo, dinero, campaña",logros:[{ico:"⚖️",txt:"Proceso 8.000"},{ico:"🌍",txt:"EEUU"}],datos:[{n:"8.000",l:"Proceso"},{n:"4",l:"Años"}],cita:""}
  ,{nombre:"Andrés Pastrana",inicio:1998,fin:2002,partido:"Conservador",tag:"Conservador",color:"#CE1126",emoji:"🕊️",desc:"Palabras clave: paz, FARC, negociación",logros:[{ico:"🕊️",txt:"Caguán"},{ico:"🇺🇸",txt:"Plan Colombia"}],datos:[{n:"42.000",l:"km²"},{n:"4",l:"Años"}],cita:""}
  ,{nombre:"Álvaro Uribe",inicio:2002,fin:2010,partido:"Uribismo",tag:"Uribismo",color:"#FCD116",emoji:"⚔️",desc:"Palabras clave: seguridad, guerrilla, operación",logros:[{ico:"⚔️",txt:"Seguridad"},{ico:"🎖️",txt:"Rescate"}],datos:[{n:"8",l:"Años"},{n:"90%",l:"Reducción"}],cita:""}
  ,{nombre:"Juan Manuel Santos",inicio:2010,fin:2018,partido:"Centro",tag:"Centro",color:"#003893",emoji:"🏆",desc:"Palabras clave: paz, Nobel, acuerdo",logros:[{ico:"🕊️",txt:"Acuerdo"},{ico:"🏆",txt:"Premio"}],datos:[{n:"8",l:"Años"},{n:"2016",l:"Nobel"}],cita:""}
  ,{nombre:"Iván Duque",inicio:2018,fin:2022,partido:"Centro Democrático",tag:"Centro",color:"#CE1126",emoji:"😷",desc:"Palabras clave: pandemia, protesta, migrantes",logros:[{ico:"😷",txt:"COVID"},{ico:"✊",txt:"Paro"}],datos:[{n:"41",l:"Edad"},{n:"1.8M",l:"Migrantes"}],cita:""}
  ,{nombre:"Gustavo Petro",inicio:2022,fin:2026,partido:"Izquierda",tag:"Izquierda",color:"#FCD116",emoji:"🌹",desc:"Palabras clave: izquierda, paz, reformas",logros:[{ico:"🌹",txt:"Histórico"},{ico:"👩🏿",txt:"Vice"}],datos:[{n:"50.4%",l:"Votos"},{n:"2022",l:"Elección"}],cita:""}
];

const track=document.getElementById('tlTrack');
DATA.forEach((p,i)=>{
  const node=document.createElement('div'); node.className='tl-node'; node.style.color=p.color;
  node.innerHTML=`
  <div class="tl-card" style="color:${p.color}">
    <div class="tl-card-top"></div>
    <span class="tl-emoji-card">${p.emoji}</span>
    <div class="tl-year">${p.inicio}</div>
    <div class="tl-name">${p.nombre}</div>
    <div class="tl-partido">${p.partido}</div>
    <span class="tl-badge">${p.tag}</span>
  </div>
  <div class="tl-connector"></div>
  <div class="tl-dot"></div>
  <div class="tl-axis-year">${p.inicio}–${p.fin}</div>
  `;
  node.addEventListener('click',()=>openModal(p));
  track.appendChild(node);
  if(i<DATA.length-1){ const sp=document.createElement('div'); sp.style.cssText='width:60px;flex-shrink:0;'; track.appendChild(sp);}
});

function openModal(p){
  document.getElementById('modalBody').innerHTML=`
    <span class="m-tag" style="background:${p.color}">${p.tag}</span>
    <span class="m-emoji">${p.emoji}</span>
    <div class="m-name">${p.nombre}</div>
    <div class="m-period">📅 ${p.inicio} – ${p.fin}</div>
    <div class="m-partido">🏛️ ${p.partido}</div>
    <p class="m-desc">${p.desc}</p>
    <div class="m-section">🏆 Logros</div>
    <ul class="m-logros">${p.logros.map(l=>`<li style="border-color:${p.color}"><span class="ico">${l.ico}</span>${l.txt}</li>`).join('')}</ul>
    <div class="m-section">📊 Datos</div>
    <div class="m-datos">${p.datos.map(d=>`<div class="m-dato"><div class="dn" style="color:${p.color}">${d.n}</div><div class="dl">${d.l}</div></div>`).join('')}</div>
  `;
  document.getElementById('overlay').classList.add('open'); document.body.style.overflow='hidden';
}

document.getElementById('closeBtn').addEventListener('click',()=>{document.getElementById('overlay').classList.remove('open'); document.body.style.overflow='';});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay')){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}});
</script>

</body>
</html>
